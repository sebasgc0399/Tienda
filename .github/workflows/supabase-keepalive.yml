# Keeps the free-tier Supabase project from auto-pausing (~1 week of DB
# inactivity) by running a real query every 3 days. See ADR-0002 and
# docs/guides/setup-desde-cero.md section 8.
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query database via PostgREST
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_KEEPALIVE_URL }}/rest/v1/categories?select=id&is_active=eq.true&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEEPALIVE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEEPALIVE_KEY }}"
